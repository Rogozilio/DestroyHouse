<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <pre id="out">running</pre>
    <script type="module">
      const paths = [
        './vendor/three/build/three.module.js',
        './vendor/three/examples/jsm/controls/OrbitControls.js',
        './vendor/three/examples/jsm/loaders/FBXLoader.js',
        './src/fracture.js',
        './src/physics.js',
        './src/imgui-panel.js'
      ];
      const results = [];
      for (const path of paths) {
        try {
          const module = await import(path);
          results.push({ path, ok: true, keys: Object.keys(module).slice(0, 5) });
        } catch (error) {
          results.push({ path, ok: false, error: String(error?.stack || error) });
          break;
        }
      }
      document.querySelector('#out').textContent = JSON.stringify(results, null, 2);
    </script>
  </body>
</html>
